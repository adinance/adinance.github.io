<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FullCalendar — ตัวอย่าง</title>
  <!-- FullCalendar CSS ใช้จาก bundle เดียว -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.18/main.min.css" rel="stylesheet" />
  <style>
    body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans', 'Helvetica Neue', Arial; padding: 12px; }
    #calendar { max-width: 1100px; margin: 0 auto; }
    .controls { max-width: 1100px; margin: 12px auto; display:flex; gap:8px; align-items:center; }
    .fc-event { cursor: pointer; }
  </style>
</head>
<body>
  <h2>ปฏิทินตัวอย่าง (FullCalendar)</h2>

  <div class="controls">
    <button id="addEventBtn">เพิ่มเหตุการณ์สุ่ม</button>
    <label><input type="checkbox" id="toggleWeekends" checked> แสดงวันหยุดสุดสัปดาห์</label>
  </div>

  <div id="calendar"></div>

  <!-- FullCalendar UMD bundle -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.18/index.global.min.js"></script>
  <script>
    const calendarEl = document.getElementById('calendar');

    const calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth,timeGridWeek,listWeek'
      },
      height: 'auto',
      selectable: true,
      editable: true,
      businessHours: true,
      locale: 'th',

      events: [
        { id: '1', title: 'งานประชุม', start: new Date().toISOString().slice(0,10) },
        { id: '2', title: 'นัดหมาย', start: new Date(new Date().getTime()+86400000).toISOString().slice(0,10) }
      ],

      dateClick: function(info) {
        const title = prompt('ชื่อตารางเหตุการณ์ สำหรับวันที่ ' + info.dateStr + ':');
        if (title) {
          calendar.addEvent({ title, start: info.dateStr, allDay: info.allDay });
        }
      },

      select: function(selectionInfo) {
        const title = prompt('ชื่องานสำหรับช่วงนี้:');
        if (title) {
          calendar.addEvent({ title, start: selectionInfo.startStr, end: selectionInfo.endStr, allDay: selectionInfo.allDay });
        }
        calendar.unselect();
      },

      eventClick: function(info) {
        if (confirm('ต้องการลบเหตุการณ์ "' + info.event.title + '" ?')) {
          info.event.remove();
        }
      }
    });

    calendar.render();

    document.getElementById('addEventBtn').addEventListener('click', function(){
      const d = new Date();
      const day = d.getDate() + Math.floor(Math.random()*10) - 5;
      const start = new Date(d.getFullYear(), d.getMonth(), day).toISOString().slice(0,10);
      calendar.addEvent({ title: 'เหตุการณ์สุ่ม', start });
    });

    document.getElementById('toggleWeekends').addEventListener('change', function(e){
      calendar.setOption('weekends', e.target.checked);
    });
  </script>
</body>
</html>
